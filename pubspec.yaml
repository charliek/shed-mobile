name: shed_mobile
description: "Direct fat-client for shed servers (no orchestrator)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # SSH: exec (runWithResult) + PTY (tmux attach) + ed25519 generate/import.
  # Exact pin — SHA256 host-key fmt + AES-GCM rekey fix; see docs/PLAN.md §0.
  dartssh2: 2.18.0
  # ed25519 keygen (CSPRNG via TweetNaCl); already transitive under dartssh2.
  pinenacl: ^0.6.0
  # State management (matches the tapper conventions; hand-written, no codegen).
  flutter_riverpod: ^3.3.1
  # Private key / control token / TLS+host-key pins at rest.
  flutter_secure_storage: ^10.3.1
  # sha256 over leaf DER for TLS pinning.
  crypto: ^3.0.6
  # In-app terminal widget (M3).
  xterm: ^4.0.0
  # ids.
  uuid: ^4.5.1
  # Open a session's claude.ai URL in the system browser (RC hand-off).
  url_launcher: ^6.3.1
  # Local-test driving (mirrors tapper). Imported from lib/, so a regular dep;
  # debug-only — tree-shaken from release builds via kDebugMode gating in main().
  marionette_flutter: ^0.5.0
  # Android specialUse foreground service — keeps the SSH/terminal session alive
  # when backgrounded (M4). No-op on desktop.
  flutter_foreground_task: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Deterministic clock for the ControlTokenProvider FSM tests.
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
