name: shed_mobile
description: "Direct fat-client for shed servers (no orchestrator)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # The owl brand SVGs. (IBM Plex Sans/Mono — the design's typeface — are bundled
  # as font assets below, not fetched at runtime.)
  flutter_svg: ^2.0.10

  # SSH: exec (runWithResult) + PTY (tmux attach) + ed25519 generate/import.
  # Exact pin — SHA256 host-key fmt + AES-GCM rekey fix; see docs/PLAN.md §0.
  dartssh2: 2.18.0
  # ed25519 keygen (CSPRNG via TweetNaCl); already transitive under dartssh2.
  pinenacl: ^0.6.0
  # State management (matches the tapper conventions; hand-written, no codegen).
  flutter_riverpod: ^3.3.1
  # Private key / control token / TLS+host-key pins at rest.
  flutter_secure_storage: ^10.3.1
  # sha256 over leaf DER for TLS pinning.
  crypto: ^3.0.6
  # In-app terminal widget (M3).
  xterm: ^4.0.0
  # ids.
  uuid: ^4.5.1
  # Open a session's claude.ai URL in the system browser (RC hand-off).
  url_launcher: ^6.3.1
  # Debug-only agent-driving helpers shared across StrideLabs Flutter apps:
  # the Marionette binding bootstrap (initMarionetteDriver) + the greppable
  # MSTATE/MRESULT drive-state log contract (logDriveState/logDriveResult).
  # Extracted from the tapper lineage that shed's lib/marionette was cloned from.
  # Debug-only — tree-shaken from release builds via kDebugMode gating in main().
  # Pulls marionette_flutter in transitively, so no direct dep needed here.
  stridelabs_drive:
    git:
      url: git@github.com:charliek/stridelabs-flutter.git
      ref: v0.1.0
      path: packages/stridelabs_drive
  # Android specialUse foreground service — keeps the SSH/terminal session alive
  # when backgrounded (M4). No-op on desktop.
  flutter_foreground_task: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Deterministic clock for the ControlTokenProvider FSM tests.
  fake_async: ^1.3.1
  # Deploys the generated owl PNGs (scripts/generate_app_icons.py) into the
  # android/ and macos/ icon slots. Config: flutter_launcher_icons.yaml.
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/owl/
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
