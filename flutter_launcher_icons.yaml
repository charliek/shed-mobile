# Deploys the owl PNGs generated by scripts/generate_app_icons.py into the
# platform icon slots. Regenerate everything with `make icons`.
#
# Two distinct looks (see the generator's color constants):
#   - Android (mobile) : an orange owl with green eyes on white   (app_icon*.png)
#   - macOS  (desktop) : a white owl with green eyes on an orange squircle
# Linux desktop has no flutter_launcher_icons support; it is not targeted here.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"

  android: true
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_monochrome: "assets/icon/app_icon_foreground.png"

  macos:
    generate: true
    image_path: "assets/icon/app_icon_desktop.png"

  ios: false
  web:
    generate: false
  windows:
    generate: false
  linux:
    generate: false
