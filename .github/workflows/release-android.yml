name: Release Android

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      build_number_offset:
        description: "Build number offset (added to run_number)"
        required: false
        default: "100"
        type: string
      release_notes:
        description: "Release notes for this version"
        required: false
        type: string

# shed-mobile is a single Flutter project (the repo root is the app), so unlike
# tapper there is no apps/flutter_client working-directory. Mirrors tapper's
# release flow otherwise: build a signed AAB, upload to Play as a draft.
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned exactly to match CI (do not drift on `channel: stable`).
          flutter-version: 3.44.2
          channel: stable

      # Gradle 9 requires JDK 17+; android/app/build.gradle.kts targets Java 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Private git dependency (stridelabs_drive lives in a private repo). The
      # ssh-agent must be loaded before `pub get` resolves the git dep.
      - name: Load SSH key for private Flutter deps
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STRIDELABS_FLUTTER_SSH_KEY }}

      # Cargo registry + git-checkout cache (the shed git-dep clones the whole
      # monorepo). The release build compiles the Rust bridge lib per ABI via
      # cargokit, which honors rust/rust-toolchain.toml (local patch).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Add Android Rust targets (all release ABIs)
        # A release appbundle builds android-arm64 + android-arm + android-x64.
        # cargokit's prepare() installs these for the pinned toolchain itself;
        # this is the fast-fail belt-and-suspenders (same as ci.yml).
        run: (cd rust && rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android)

      - name: Flutter checks
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Calculate build number
        id: version
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} + ${{ inputs.build_number_offset }} ))
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          RELEASE_NAME="${VERSION_NAME} (${BUILD_NUMBER})"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build app bundle
        env:
          KEYSTORE_PATH: upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flutter build appbundle \
            --release \
            --build-number=${{ steps.version.outputs.build_number }} \
            --build-name=${{ steps.version.outputs.version_name }}

      # Play REQUIRES 16 KB page alignment on 64-bit ABIs. This gate makes a
      # toolchain/config regression fail the release build rather than Play's
      # own validation. Checks EVERY .so per ABI (libflutter/libapp/plugins
      # would fail Play just like ours), enforces 64-bit + records sizes, and
      # requires all three release ABIs to be present (fail-closed on a
      # packaging regression). Shared script with ci.yml's debug gate.
      - name: Verify 16 KB alignment + record native-lib sizes (release)
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y llvm unzip binutils
          AAB=build/app/outputs/bundle/release/app-release.aab
          test -f "$AAB" || { echo "AAB not found: $AAB" >&2; exit 1; }
          WORK=$(mktemp -d)
          unzip -o -q "$AAB" -d "$WORK"
          # An AAB stages native libs under base/lib/<abi>/.
          bash scripts/check-16kb-alignment.sh "$WORK/base/lib" armeabi-v7a,arm64-v8a,x86_64

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: android

      - name: Write Play Store credentials
        run: echo '${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}' > /tmp/play-store-key.json

      - name: Write release notes
        if: inputs.release_notes != ''
        run: |
          mkdir -p android/fastlane/metadata/android/en-US/changelogs
          echo "${{ inputs.release_notes }}" > "android/fastlane/metadata/android/en-US/changelogs/${{ steps.version.outputs.build_number }}.txt"

      - name: Upload to Play Store
        env:
          PLAY_STORE_JSON_KEY_PATH: /tmp/play-store-key.json
          PLAY_STORE_TRACK: ${{ inputs.track }}
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
        working-directory: android
        run: bundle exec fastlane deploy

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f /tmp/play-store-key.json

      - name: Summary
        run: |
          echo "### Android Release Uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release**: ${{ steps.version.outputs.release_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Track**: ${{ inputs.track }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Action required**: This release was uploaded as a draft. Go to the [Google Play Console](https://play.google.com/console) and promote it to testers on the **${{ inputs.track }}** track." >> "$GITHUB_STEP_SUMMARY"
