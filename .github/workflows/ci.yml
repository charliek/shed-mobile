name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Native ubuntu build. `flutter build linux --debug` compiles the Rust bridge
  # lib via cargokit for the x86_64 HOST (a native build, not a cross-compile),
  # so cargo runs inside it — rust-cache below keeps that fast.
  flutter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          # Pinned exactly — do not rely on `channel: stable` drifting (PLAN §13 A6).
          flutter-version: 3.44.2
          channel: stable
      # Private git dependency (stridelabs_drive lives in a private repo). The
      # ssh-agent must be loaded before `pub get` resolves the git dep.
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STRIDELABS_FLUTTER_SSH_KEY }}
      # Cache the cargo registry + git checkouts (and `rust/target`). `~/.cargo/git`
      # matters most: the shed git-dep clones the WHOLE monorepo per job. NOTE:
      # `workspaces: rust` caches `rust/target`, but cargokit passes `--target-dir`
      # into per-platform temp build dirs, so the platform BUILD jobs
      # (linux/macos/android) reuse only the registry/git data, not compiled
      # artifacts; only the codegen-drift job (plain `cargo` in `rust/`) gets the
      # full `rust/target` benefit. (Remapping the per-platform target-dir is not
      # worth it — registry/git reuse is where the win is.)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Guard: the committed Cargo.lock must resolve shed-core/shed-app to the
      # exact git rev pinned in rust/Cargo.toml — the gitignored local [patch]
      # (rust/.cargo/config.toml) must never leak a local path into the lock.
      - name: Lock-rev equality
        run: bash scripts/check-lock-rev.sh
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
      - name: Install Linux desktop build deps
        # libsecret-1-dev + libjsoncpp-dev are required by flutter_secure_storage_linux.
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev
      # Native host build: compiles the Rust lib (cargo, via cargokit) + links it.
      - run: flutter build linux --debug

  # macOS arm64 native build — so the mac artifact is CI-gated, not dev-only.
  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          # Same exact pin as flutter-check.
          flutter-version: 3.44.2
          channel: stable
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STRIDELABS_FLUTTER_SSH_KEY }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: flutter pub get
      # arm64 native build — compiles the Rust staticlib (cargo, via cargokit).
      - run: flutter build macos --debug

  # Android cross-compile (arm64). Exercises the vendored cargokit Gradle-9 patch
  # (project.exec -> injected ExecOperations) + rust_builder/android compileSdk 36.
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          # Same exact pin as flutter-check.
          flutter-version: 3.44.2
          channel: stable
      # Gradle 9 requires JDK 17+; android/app/build.gradle.kts targets Java 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STRIDELABS_FLUTTER_SSH_KEY }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: flutter pub get
      - name: Add Android arm64 Rust target
        # cargokit's prepare() now installs the Android target for the PINNED
        # toolchain itself (the vendored build_tool reads rust/rust-toolchain.toml
        # and runs `rustup run <version> cargo …`), so this step is no longer
        # load-bearing. Keep the pinned add as a fast-fail belt-and-suspenders so
        # a broken rustup/target surfaces here with a clear message rather than
        # deep inside the gradle build.
        run: (cd rust && rustup target add aarch64-linux-android)
      # Single ABI keeps CI time sane. The NDK is auto-installed by sdkmanager
      # during the gradle build (android/app delegates to flutter.ndkVersion).
      # This build exercises the vendored cargokit Gradle-9 patch.
      - run: flutter build apk --debug --target-platform android-arm64
      # 16 KB page-alignment gate + native-lib size record (every .so, every
      # ABI; 64-bit enforced, 32-bit recorded — see the shared script). Debug
      # alignment holds with NDK r28; this catches toolchain drift early.
      # arm64-v8a is the ABI we build for; cargokit adds extra debug ABIs,
      # which the script classifies fail-closed.
      - name: Verify 16 KB alignment + record native-lib sizes
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y llvm unzip binutils
          APK=$(find build/app/outputs -name '*.apk' -print -quit)
          echo "APK: $APK"
          WORK=$(mktemp -d)
          unzip -o -q "$APK" -d "$WORK"
          bash scripts/check-16kb-alignment.sh "$WORK/lib" arm64-v8a

  # Committed-glue drift guard: regenerate with the PINNED codegen and assert the
  # generated outputs are byte-identical to what's committed (mirrors `make frb-gen`).
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          # Same exact pin as flutter-check.
          flutter-version: 3.44.2
          channel: stable
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STRIDELABS_FLUTTER_SSH_KEY }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # The FRB codegen binary install is slow (~5-10 min compile), so cache the
      # built binary keyed by the pinned version — it pays only on a version bump.
      - name: Cache flutter_rust_bridge_codegen binary
        id: frb-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/flutter_rust_bridge_codegen*
          key: frb-codegen-2.13.0-beta.5
      - name: Install pinned flutter_rust_bridge_codegen
        if: steps.frb-cache.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen --version 2.13.0-beta.5 --locked
      # FRB's `generate` shells out to `cargo expand`; on a cold runner missing it
      # FRB auto-installs an UNPINNED cargo-expand, which is a tool-dependent drift
      # source. Pin it to the version dev uses (cargo expand --version) so the
      # generated glue is reproducible. Cache the built binary keyed by version —
      # it pays only on a version bump.
      - name: Cache cargo-expand binary
        id: cargo-expand-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-expand*
          key: cargo-expand-1.0.123
      - name: Install pinned cargo-expand
        if: steps.cargo-expand-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-expand --version 1.0.123 --locked
      - run: flutter pub get
      # The mandatory two-step codegen (mirror `make frb-gen`): FRB generate THEN
      # build_runner expands the @freezed sealed-class sources. The explicit
      # `dart run build_runner build` intentionally mirrors `make frb-gen` even
      # though FRB may auto-run build_runner itself (a harmless double-run).
      - name: Regenerate bridge glue (two-step)
        run: |
          flutter_rust_bridge_codegen generate
          dart run build_runner build
      # Scope the diff to generated outputs so unrelated tool churn can't
      # false-positive; git status catches NEW untracked generated files too.
      - name: Assert no drift in generated glue
        run: |
          set -euo pipefail
          PATHS="lib/src/rust rust/src/frb_generated.rs"
          git diff --exit-code -- $PATHS
          if [ -n "$(git status --porcelain -- $PATHS)" ]; then
            echo "Untracked/changed generated files under: $PATHS" >&2
            git status --porcelain -- $PATHS >&2
            exit 1
          fi
