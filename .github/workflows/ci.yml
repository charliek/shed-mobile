name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          # Pinned exactly — do not rely on `channel: stable` drifting (PLAN §13 A6).
          flutter-version: 3.44.2
          channel: stable
      # Private git dependency (stridelabs_drive lives in a private repo). The
      # ssh-agent must be loaded before `pub get` resolves the git dep.
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STRIDELABS_FLUTTER_SSH_KEY }}
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
      - name: Install Linux desktop build deps
        # libsecret-1-dev + libjsoncpp-dev are required by flutter_secure_storage_linux.
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev
      - run: flutter build linux --debug
